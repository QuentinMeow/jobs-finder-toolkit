# Canary set — behavioral-interview-prep skill
# Grounded in skills/behavioral-interview-prep/SKILL.md + QUESTION_BANK.md: project-based
# story-bank shape (read-only unless explicitly requested), YAML-backed multi-project answer
# options with connected compact STAR paragraphs, 75-130-second quick answers, self-contained
# combined answers, prominent impact, two appended general-story reference styles, and at least two
# project answers per source. Equivalent questions share a neutral source with a leading
# _general_ output plus company-prefixed aliases. Tell-me-about-yourself uses a general-* file and
# present->past->future (NOT STAR). Company prep covers every principle with either a complete
# grounded source or an explicit evidence gap; it never fabricates to hit a file count. Uses the
# fictional 'Jordan Rivers' example profile. Run per evals/README.md; judge per evals/rubrics/judging.md.
skill: behavioral-interview-prep
default_setup: >
  config.yaml unset -> config.example.yaml + examples/** fallback; the profile is
  examples/profile/profile.example.md (projects tagged [draft]/[backup] are the real material).
  Behavioral output lands under interviews/behavioral/{story-bank,question-bank}/
  (scratch/git-ignored in a public checkout; the transcript is judged, not a commit). No network,
  no private overlay needed.

canaries:
  - id: bp-story-bank-file
    requires_overlay: false
    prompt: "Build a project story-bank file for one of my strongest projects from my profile."
    setup: "Default setup. Derives a project/workstream from the example profile."
    expected_behavior:
      - "Because the user explicitly requested a story-bank file, produces ONE file for ONE project/workstream, intentionally long and chronological."
      - "Uses the preferred structure — a Story Index (Themes / Best question fits / Strongest proof points / Known gaps to fill), a Chronological Story Detail section, and Answer Generation Notes."
      - "Every detail paragraph begins with a short parenthesized tag combining area + summary, e.g. '(Context - ...)', '(Decision - ...)', '(Setback - ...)', '(Result - ...)'."
      - "Uses only real material from the profile; marks unknowns as explicit 'Known gaps' rather than inventing metrics, conflict, ownership, or technologies; defaults to 'I' not 'we'."
    failure_modes:
      - "Collapses the story into one polished interview answer instead of verbose chronology."
      - "One-question-per-file instead of one-project-per-file; missing the parenthesized tags."
      - "Fabricates numbers or scope not present in the profile."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]

  - id: bp-story-revision-credibility
    requires_overlay: false
    prompt: >
      Revise this payments-platform story for interview use, using my profile as the source of
      truth: "I volunteered because leadership ignored the problem. We split the monolith, and
      that alone saved the company millions. I made every migration decision and the team
      implemented my plan. After contract tests reduced failed-payment incidents by 40%, I
      designed retry semantics."
    setup: "Default setup. Adversarial revision containing unsupported motive, impact, sole credit, and causality."
    expected_behavior:
      - "Explicitly flags and rejects the unsupported leadership motive, savings claim, and sole-credit claim instead of polishing them."
      - "Preserves supported causality: retry semantics reduced failed-payment incidents by 40%; contract tests and canary releases enabled safer shipping."
      - "Does not invent event ordering where the profile establishes none."
      - "Uses `I` for supported personal actions while retaining explicit credit for shared implementation and team outcomes."
    failure_modes:
      - "Retains or softens unsupported motives or impact, attributes the 40% result to contract tests, invents chronology, hides personal action behind vague `we`, or claims shared work personally."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]

  - id: bp-story-to-question-mapping
    requires_overlay: false
    prompt: >
      Take my payments/platform project and map it to the behavioral questions it can answer,
      then give me an answer for it.
    setup: "Default setup, single-story input drawn from the profile."
    expected_behavior:
      - "Maps the story to 2-4 question families (prefers versatile stories), with a Best-fit Questions list and a Recommended Angle explaining why it fits."
      - "Does not modify the source story bank; for a persisted answer, writes a neutral question-family YAML under behavioral/question-bank/sources/ and treats generated Markdown aliases as output."
      - "Starts outputs with a natural `_general_...` question alias and adds company-prefixed aliases only when they use the same answer strategy."
      - "Uses an answers list with at least two distinct project_title options; each option has a self-contained quick answer, self-contained combined quick+short answer, and additive short/long technical expansions."
      - "The quick answer targets 90 seconds and is hard-bounded to 75-130 seconds at the configured speaking rate."
      - "Renders one compact paragraph per STAR point as '(Situation) ...' rather than large headings or isolated summary/detail sentences; the prose stays connected when labels are removed."
      - "Makes exact personal ownership and impact prominent, with Action largest and Result covering beneficiary/outcome/risk/durable effect."
      - "Appends both tagged general-story reference styles per project: connected timeline and isolated problem/personal-action/impact areas."
    failure_modes:
      - "Writes generated Markdown directly without a YAML source or leaves source/output out of sync."
      - "Edits the story-bank source without an explicit request, or conflates being assigned/on-call with volunteering."
      - "Disconnected sentence fragments, large STAR headings, weak impact, technical expansions that repeat the quick answer, or a missing combined/reference view."
      - "Setup-heavy answer with little Action, no question-family mapping, or quick-answer timing outside 75-130 seconds."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]

  - id: bp-tell-me-about-yourself
    requires_overlay: false
    prompt: "Help me answer 'tell me about yourself' for software engineering interviews."
    setup: "Default setup. If persisted, this is a general-* file."
    expected_behavior:
      - "Uses a present -> past -> future structure, NOT forced STAR."
      - "Keeps a concise high-level answer with optional technical follow-ups introduced as bridges ('If useful, I can go deeper...')."
      - "If saved to behavioral/question-bank/, uses a general-* filename, keeps a visible '#' title, and does not create a YAML source or apply STAR/timing validation."
      - "Grounds every claim in the real profile; length fits spoken delivery."
    failure_modes:
      - "Forces STAR onto 'tell me about yourself'."
      - "Creates a checked answer-source YAML for the general question, omits the general- prefix, or fabricates experience not in the profile."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]

  - id: bp-company-principles
    requires_overlay: false
    prompt: "Prep me for Amazon's Leadership Principles behavioral round."
    setup: >
      Default setup. Company-specific culture/principle prep. (Amazon is named in the skill as a
      framing target — no live company research is done here.)
    expected_behavior:
      - "Covers every Amazon principle in a plan: creates exactly ONE company-prefixed output for each principle with two grounded profile stories, and explicitly lists any unsupported principle as an evidence gap instead of fabricating."
      - "Backs equivalent natural and company-named questions with one neutral family source (e.g. sources/deliver-results.yaml), whose first output is `_general_deliver-results` and whose later aliases include `amazon-deliver-results`."
      - "Each source has at least two titled project answers; every project includes the timed quick answer, self-contained combined answer, additive technical expansions, and both story-reference styles."
      - "Maps real profile stories to the Amazon LP framing (ownership, customer impact, dive deep, delivery) WITHOUT changing the underlying facts."
    failure_modes:
      - "One combined file for all principles instead of one file each."
      - "Fabricates a second story or unsupported behavioral evidence to claim complete file coverage, or silently omits unsupported principles without listing the evidence gaps."
      - "Hand-writes generated Markdown, uses fragmented STAR snippets, weakens impact, omits answer modules/references, exceeds timing limits, or alters the facts."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]
